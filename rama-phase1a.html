<script>
'use strict';
/* =====================================================================
   RAMA — THE RETRO GAME · v1 Build A
   Fresh engine: rooms, NPCs, dialogue, Book of Dharma, cloud saves.
   Author: Anubhav Manna · The Creative Technologist
===================================================================== */

/* ---------------- Firebase config (PASTE YOURS HERE) ---------------- */
const FIREBASE_CONFIG = null; /* e.g.
const FIREBASE_CONFIG = {
  apiKey:"...", authDomain:"rama-retro-game.firebaseapp.com",
  projectId:"rama-retro-game", storageBucket:"...",
  messagingSenderId:"...", appId:"..."
}; */

/* ---------------- Cloud adapter (Firestore + local fallback) -------- */
const Cloud = {
  ready:false, offline:true, user:null, db:null, _t:null,
  init(){
    if(!FIREBASE_CONFIG){ this.offline=true; return; }
    try{
      firebase.initializeApp(FIREBASE_CONFIG);
      this.db = firebase.firestore();
      this.offline=false; this.ready=true;
    }catch(e){ this.offline=true; }
  },
  signIn(){
    if(this.offline) return Promise.reject(new Error('offline'));
    const prov = new firebase.auth.GoogleAuthProvider();
    return firebase.auth().signInWithPopup(prov);
  },
  onAuth(cb){
    if(this.offline){ cb(null); return; }
    firebase.auth().onAuthStateChanged(cb);
  },
  async load(uid){
    if(this.offline||!uid) return null;
    try{ const d=await this.db.collection('saves').doc(uid).get();
      return d.exists? d.data():null; }catch(e){ return null; }
  },
  save(uid,data){
    if(this.offline||!uid) return;
    clearTimeout(this._t);
    this._t=setTimeout(()=>{ this.db.collection('saves').doc(uid)
      .set(data,{merge:true}).catch(()=>{}); },1200);
  },
  submitScore(uid,name,photo,score){
    if(this.offline||!uid) return;
    this.db.collection('leaderboard').doc(uid).set({
      name:name||'Pilgrim', photo:photo||'', score:score,
      t:firebase.firestore.FieldValue.serverTimestamp()
    },{merge:true}).catch(()=>{});
  },
  async top(n=10){
    if(this.offline) return [];
    try{ const q=await this.db.collection('leaderboard')
        .orderBy('score','desc').limit(n).get();
      return q.docs.map(d=>d.data()); }catch(e){ return []; }
  }
};

/* ---------------- Save state ---------------- */
const DEFAULT_SAVE = ()=>({
  chapter:1, dharma:0,
  flags:{},           // story/quest flags
  talked:{},          // npc id -> times
  entries:[],         // Book of Dharma entry ids
  pos:null,           // {room,x}
  v:1
});
let SAVE = DEFAULT_SAVE();
function localLoad(){ try{ const d=JSON.parse(localStorage.getItem('rama_v1'));
  if(d&&d.v===1){ const base=DEFAULT_SAVE(); for(const k in SAVE)delete SAVE[k];
    Object.assign(SAVE,base,d); } }catch(e){} }
function persist(){
  try{ localStorage.setItem('rama_v1',JSON.stringify(SAVE)); }catch(e){}
  if(Cloud.user) Cloud.save(Cloud.user.uid,SAVE);
}

/* ---------------- Input (edge-based, never drops) ---------------- */
const KEYS={}, EDGE={};
const KEYMAP=['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','KeyA','KeyS','KeyD',
  'KeyW','KeyB','Enter','Escape','KeyP','KeyF','KeyM','Space'];
addEventListener('keydown',e=>{ if(KEYMAP.includes(e.code)){ e.preventDefault();
  if(!KEYS[e.code])EDGE[e.code]=true; KEYS[e.code]=true; Audio2.unlock(); }});
addEventListener('keyup',e=>{ if(KEYMAP.includes(e.code)){ e.preventDefault(); KEYS[e.code]=false; }});
const held =k=>!!KEYS[k];
const tap  =k=>!!EDGE[k];
function clearEdges(){ for(const k in EDGE)EDGE[k]=false; POINTER.tapped=false; }
/* touch */
const isTouch = matchMedia('(pointer:coarse)').matches;
if(isTouch) document.body.classList.add('touch');
document.querySelectorAll('.tb').forEach(b=>{
  const k=b.dataset.k;
  const on=e=>{e.preventDefault(); if(!KEYS[k])EDGE[k]=true; KEYS[k]=true; b.classList.add('on'); Audio2.unlock();};
  const off=e=>{e.preventDefault(); KEYS[k]=false; b.classList.remove('on');};
  b.addEventListener('pointerdown',on); b.addEventListener('pointerup',off);
  b.addEventListener('pointerleave',off); b.addEventListener('pointercancel',off);
});
const POINTER={x:0,y:0,tapped:false};
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
cv.addEventListener('pointerdown',e=>{ const r=cv.getBoundingClientRect();
  POINTER.x=(e.clientX-r.left)/r.width*640; POINTER.y=(e.clientY-r.top)/r.height*360;
  POINTER.tapped=true; Audio2.unlock(); });

/* ---------------- Canvas scaling ---------------- */
function fit(){
  const w=innerWidth,h=innerHeight, a=640/360;
  let cw=w, ch=w/a; if(ch>h){ ch=h; cw=h*a; }
  cv.style.width=cw+'px'; cv.style.height=ch+'px';
}
addEventListener('resize',fit); fit();
ctx.imageSmoothingEnabled=false;

/* ---------------- Audio: chiptune-raga engine ---------------- */
const Audio2={
  AC:null, muted:false, master:null, droneG:null, iv:null, step:0, track:null, name:null,
  unlock(){ if(!this.AC){ try{
      this.AC=new (window.AudioContext||window.webkitAudioContext)();
      this.master=this.AC.createGain(); this.master.gain.value=.8;
      this.master.connect(this.AC.destination);
    }catch(e){} }
    if(this.AC&&this.AC.state==='suspended') this.AC.resume();
    if(this.name&&!this.iv) this.play(this.name,true);
  },
  tone(f,dur,type,vol,slide){
    if(!this.AC||this.muted)return;
    const t=this.AC.currentTime,o=this.AC.createOscillator(),g=this.AC.createGain();
    o.type=type; o.frequency.setValueAtTime(f,t);
    if(slide)o.frequency.linearRampToValueAtTime(Math.max(30,f+slide),t+dur);
    g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(.0001,t+dur);
    o.connect(g); g.connect(this.master); o.start(t); o.stop(t+dur+.02);
  },
  noise(dur,vol,hp){
    if(!this.AC||this.muted)return;
    const t=this.AC.currentTime, n=this.AC.sampleRate*dur|0,
      buf=this.AC.createBuffer(1,n,this.AC.sampleRate), ch=buf.getChannelData(0);
    for(let i=0;i<n;i++)ch[i]=(Math.random()*2-1)*(1-i/n);
    const s=this.AC.createBufferSource(); s.buffer=buf;
    const f=this.AC.createBiquadFilter(); f.type='highpass'; f.frequency.value=hp||2000;
    const g=this.AC.createGain(); g.gain.value=vol;
    s.connect(f); f.connect(g); g.connect(this.master); s.start(t);
  },
  /* Yaman-flavoured scale (Lydian): S R G M# P D N */
  RAGA:[0,2,4,6,7,9,11,12,14,16,18,19],
  TRACKS:{
    ayodhya:{bpm:96, root:146.83, mel:'triangle', vol:.06,
      seq:[0,null,2,4, 7,null,4,2, 4,null,7,9, 7,null,4,null,
           0,null,2,4, 7,null,9,11, 12,null,11,9, 7,null,4,2],
      tabla:[1,0,0,2, 0,0,1,0, 1,0,0,2, 0,2,1,0]},
    dusk:{bpm:72, root:130.81, mel:'triangle', vol:.05,
      seq:[4,null,null,2, 0,null,null,null, 2,null,4,null, 7,null,null,null,
           4,null,null,7, 9,null,null,null, 7,null,4,null, 2,null,null,null],
      tabla:[1,0,0,0, 0,0,2,0, 1,0,0,0, 2,0,0,0]}
  },
  play(name,force){
    if(this.name===name&&!force)return;
    this.stop(); this.name=name;
    const tr=this.TRACKS[name]; if(!tr||!this.AC)return;
    this.track=tr; this.step=0;
    /* tanpura-style drone: root + fifth, slow detune shimmer */
    this.droneG=this.AC.createGain(); this.droneG.gain.value=.035;
    this.droneG.connect(this.master); this.droneNodes=[];
    [[1,0],[1.5,.6],[2,-.7]].forEach(([m,det])=>{
      const o=this.AC.createOscillator(); o.type='sawtooth';
      o.frequency.value=tr.root*m/2; o.detune.value=det*6;
      const g=this.AC.createGain(); g.gain.value=.5;
      o.connect(g); g.connect(this.droneG); o.start(); this.droneNodes.push(o);
    });
    const stepMs=60000/tr.bpm/4;
    this.iv=setInterval(()=>{
      const i=this.step%32, n=tr.seq[i];
      if(n!==null&&n!==undefined){
        const st=this.RAGA[n%this.RAGA.length]+Math.floor(n/12)*12;
        this.tone(tr.root*Math.pow(2,st/12)*2,stepMs/1000*2.6,tr.mel,tr.vol);
      }
      const tb=tr.tabla[i%16];
      if(tb===1){ this.tone(72,.09,'sine',.11,-24); }       /* dha */
      else if(tb===2){ this.noise(.05,.05,3600); }          /* na  */
      this.step++;
    },stepMs);
  },
  pause(){ if(this.iv){clearInterval(this.iv);this.iv=null;}
    if(this.droneG)this.droneG.gain.value=0; },
  resume(){ if(this.name&&!this.iv){const n=this.name;this.name=null;this.play(n);} },
  stop(){ this.pause();
    if(this.droneNodes){this.droneNodes.forEach(o=>{try{o.stop()}catch(e){}});this.droneNodes=null;}
    this.name=null; this.track=null; },
  bell(){ this.tone(1244,1.6,'triangle',.09); this.tone(1866,1.2,'triangle',.04); },
  chirp(){ this.tone(2200+Math.random()*800,.08,'square',.02,300); },
  uiA(){ this.tone(880,.07,'square',.06); },
  uiB(){ this.tone(660,.06,'square',.05,-120); },
  dharma(){ this.tone(587,.5,'triangle',.09); setTimeout(()=>this.tone(880,.7,'triangle',.09),160);
    setTimeout(()=>this.tone(1174,.9,'triangle',.07),340); },
  stepSfx(){ this.noise(.03,.015,5000); }
};
</script>

function toast(m){ G.toastMsg=m; G.toastT=3; }
function grantEntry(id){
  if(SAVE.entries.includes(id))return;
  SAVE.entries.push(id); SAVE.dharma+=10; persist();

function enterRoom(id,px){
  const r=ROOMS[id]; G.room=r; G.roomId=id;
  P.x=px!==undefined?px:r.spawn; P.y=GROUND; P.vy=0;
  NPCS=(r.npcs||[]).map(n=>({...n, y:GROUND, dir:1, wt:Math.random()*3, wx:n.x }));
  BIRDS=[]; for(let i=0;i<(r.birds||0);i++)
    BIRDS.push({x:120+Math.random()*(r.w-240), y:GROUND, fly:0, vx:0, vy:0});
  SAVE.pos={room:id,x:P.x}; persist();
}

/* ---------------- Update ---------------- */
function updatePlay(dt){
  const r=G.room;
  /* movement */
  const sp=120;
  let mx=0;
  if(held('ArrowLeft')){mx=-1;P.dir=-1;}
  if(held('ArrowRight')){mx=1;P.dir=1;}
  P.x+=mx*sp*dt;
  if(mx&&P.onG){ P.walkT+=dt*9; if(((P.walkT|0)%2===0)&&Math.random()<.08)Audio2.stepSfx(); }
  /* jump */
  if((tap('ArrowUp')||tap('Space'))&&P.onG){ P.vy=-360; P.onG=false; Audio2.tone(300,.14,'square',.05,240); }
  if(!P.onG){ P.vy+=1100*dt; P.y+=P.vy*dt;
    if(P.y>=GROUND){P.y=GROUND;P.vy=0;P.onG=true;} }
  /* room edges → transitions */
  if(P.x<20){ if(r.exits.left){ enterRoom(r.exits.left.room,r.exits.left.x); return; } P.x=20; }
  if(P.x>r.w-20){ if(r.exits.right){ enterRoom(r.exits.right.room,r.exits.right.x); return; } P.x=r.w-20; }
  /* camera */
  const target=Math.max(0,Math.min(P.x-W/2,r.w-W));
  G.camX+=(target-G.camX)*Math.min(1,dt*8);
  /* NPC wander */
  for(const n of NPCS){
    n.wt-=dt;
    if(n.kid){ n.x+=Math.sin(G.t*2+n.wx)*40*dt; n.dir=Math.sin(G.t*2+n.wx)>0?1:-1; }
    else if(n.wt<=0){ n.wt=2+Math.random()*4;
      const d=(Math.random()*60-30); n.tx=Math.max(n.wx-50,Math.min(n.wx+50,n.x+d)); }
    if(n.tx!==undefined&&Math.abs(n.tx-n.x)>2&&!n.guru){
      n.dir=n.tx>n.x?1:-1; n.x+=n.dir*22*dt; }
  }
  /* birds startle */
  for(const b of BIRDS){
    if(!b.fly&&Math.abs(P.x-b.x)<44){ b.fly=1; b.vx=(b.x<P.x?-1:1)*(60+Math.random()*60);
      b.vy=-120-Math.random()*80; Audio2.chirp(); }
    if(b.fly){ b.x+=b.vx*dt; b.y+=b.vy*dt; b.vy-=40*dt; }
  }
  /* musician proximity: soft veena notes */
  for(const n of NPCS) if(n.music&&Math.abs(P.x-n.x)<130&&Math.random()<dt*1.2)
    Audio2.tone(392*Math.pow(2,Audio2.RAGA[(Math.random()*7)|0]/12),.4,'triangle',.03);
  /* temple bell interact zone handled via nearest interactable */
  /* interact */
  const near=nearestInteract();
  if(tap('KeyA')&&near){ startInteract(near); }
  if(tap('KeyS')){ G.mode='book'; Audio2.uiA(); }
}
function nearestInteract(){
  let best=null,bd=48;
  for(const n of NPCS){ const d=Math.abs(P.x-n.x); if(d<bd){bd=d;best={type:'npc',n};} }
  if(G.roomId==='temple_square'){ const d=Math.abs(P.x-560);
    if(d<40&&(!best||d<bd))best={type:'bell'}; }
  return best;
}
function startInteract(it){
  if(it.type==='bell'){ Audio2.bell(); toast('🔔 The bell clears the mind…');
    if(!SAVE.flags.bell){SAVE.flags.bell=1;SAVE.dharma+=5;persist();} return; }
  const n=it.n, lines=DIALOGS[n.id]||[];
  const t=(SAVE.talked[n.id]||0);
  const li=Math.min(t,lines.length-1);
  G.dlg={ npc:n, page:lines[li] }; G.dlgChar=0; G.mode='dialog'; Audio2.uiA();
  if(!SAVE.talked[n.id]){ G.metCount++;
    if(!SAVE.flags.met5 && Object.keys(SAVE.talked).length+1>=5){
      SAVE.flags.met5=1; G.objective='Find Guru Vashishtha — training grounds, far east';
      toast('Objective updated'); }
  }
  SAVE.talked[n.id]=t+1; persist();
  if(n.guru&&!SAVE.flags.guruMet){ SAVE.flags.guruMet=1;
    G.objective='Rest — the bow awaits (next chapter)'; }
}
function updateDialog(dt){
  const full=G.dlg.page[1];
  if(G.dlgChar<full.length){ G.dlgChar=Math.min(full.length,G.dlgChar+dt*46);
    if(tap('KeyA')||POINTER.tapped){G.dlgChar=full.length;} return; }
  if(tap('KeyA')||POINTER.tapped){

}

/* ---------------- Frame loop (fixed timestep) ---------------- */
let acc=0,lastT=performance.now();
function frame(now){
  const raw=Math.min((now-lastT)/1000,.1); lastT=now; acc+=raw;
  const DT=1/60;
  while(acc>=DT){
    if(G.mode!=='pause')G.t+=DT;
    if(tap('KeyM')){Audio2.muted=!Audio2.muted;}
    if(tap('KeyF')){ if(!document.fullscreenElement)document.documentElement.requestFullscreen&&document.documentElement.requestFullscreen();
      else document.exitFullscreen(); }
    if((tap('KeyP')||tap('Escape'))&&(G.mode==='play')){G.mode='pause';Audio2.pause();}
    else if(G.mode==='play')updatePlay(DT);
    else if(G.mode==='dialog')updateDialog(DT);
    else if(G.mode==='book')updateBook();
    else if(G.mode==='pause')updatePause();
    if(G.toastT>0)G.toastT-=DT;
    clearEdges();
    acc-=DT;
  }
  /* render */
  if(G.mode!=='gate'&&G.room){
    const th=THEMES[G.room.theme];
    drawSky(th); drawDecor(); drawGround(th);
    for(const b of BIRDS)drawBird(b);
    for(const n of NPCS)
      drawHuman(px(n.x),n.y,n.dir,n.c,'#d8a878',n.kid?G.t*10:(Math.abs((n.tx||n.x)-n.x)>2?G.t*8:0),
        {old:n.guru||n.id==='sita_hint',veena:n.music,hair:n.kid?'#3a2a10':undefined});
    drawHuman(px(P.x),P.y,P.dir,'#3a58c8','#c89060',
      (held('ArrowLeft')||held('ArrowRight'))&&P.onG?G.t*11:0,{crown:true,bow:true});
    drawHUD();
    if(G.mode==='dialog')drawDialog();
    if(G.mode==='book')drawBook();
    if(G.mode==='pause')drawPauseScr();
  }
  requestAnimationFrame(frame);
}

    gate.style.display='none';
    const pos=SAVE.pos&&ROOMS[SAVE.pos.room]?SAVE.pos:{room:'palace_court',x:ROOMS.palace_court.spawn};
    if(SAVE.flags.met5)G.objective=SAVE.flags.guruMet?'Rest — the bow awaits (next chapter)':'Find Guru Vashishtha — training grounds, far east';
    enterRoom(pos.room,pos.x);
    G.mode='play';
    Audio2.unlock(); Audio2.play('ayodhya');
  };
  if(user){ Cloud.load(user.uid).then(cloudSave=>{
      if(cloudSave&&cloudSave.v===1&&(cloudSave.dharma||0)>=(SAVE.dharma||0)){
        const base=DEFAULT_SAVE(); for(const k in SAVE)delete SAVE[k];
        Object.assign(SAVE,base,cloudSave); }
      go();
    }); } else go();
}
Cloud.init();
if(Cloud.offline){
  devEnter.style.display='block'; cfgNote.style.display='block';
  gbtn.addEventListener('click',()=>{ gerr.style.display='block';
    gerr.textContent='Firebase keys not pasted yet — use offline dev mode below, or send Claude your firebaseConfig.'; });
  devEnter.addEventListener('click',()=>startGame(null));
}else{
  gbtn.addEventListener('click',()=>{ Cloud.signIn().catch(e=>{
    gerr.style.display='block'; gerr.textContent='Sign-in failed: '+(e&&e.message||e); }); });
  Cloud.onAuth(u=>{ if(u){ who.style.display='block';
      who.textContent='🙏 '+(u.displayName||'Pilgrim'); startGame(u); } });
}
requestAnimationFrame(frame);
/* debug hook */
window.__DBG={G,P,SAVE,enterRoom,Audio2,Cloud,startGame,get NPCS(){return NPCS}};
</script>
</body>
</html>
